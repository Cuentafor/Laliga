<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Liga — En vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#f1f3f4; color:#202124; font-size:17px; min-height:100vh; }
  header { background:#fff; border-bottom:1px solid #e0e0e0; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .header-left { display:flex; align-items:center; gap:12px; }
  .header-titulo { font-size:20px; font-weight:700; }
  .header-sub { font-size:13px; color:#5f6368; margin-top:1px; }
  .reloj { font-size:15px; color:#5f6368; font-weight:500; }
  .btn-refresh { background:none; border:1.5px solid #dadce0; border-radius:8px; padding:7px 14px; font-size:14px; font-weight:600; color:#1a73e8; cursor:pointer; display:flex; align-items:center; gap:6px; transition:background .15s; }
  .btn-refresh:hover { background:#e8f0fe; }
  .spin { animation:girar .8s linear infinite; }
  @keyframes girar { to { transform:rotate(360deg); } }
  .contenido { max-width:720px; margin:0 auto; padding:20px 16px 40px; }
  .seccion { background:#fff; border-radius:16px; margin-bottom:16px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.1); }
  .sec-titulo { font-size:12px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:#5f6368; padding:14px 20px 10px; border-bottom:1px solid #f1f3f4; }
  .partido { display:grid; grid-template-columns:1fr 110px 1fr; align-items:center; padding:14px 16px; border-bottom:1px solid #f1f3f4; gap:6px; }
  .partido:last-child { border-bottom:none; }
  .eq-home { display:flex; align-items:center; gap:10px; justify-content:flex-end; }
  .eq-away { display:flex; align-items:center; gap:10px; }
  .eq-nom { font-size:15px; font-weight:600; line-height:1.2; }
  .eq-nom.home { text-align:right; }
  .escudo-p { width:38px; height:38px; object-fit:contain; flex-shrink:0; }
  .centro { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .marcador { font-size:26px; font-weight:800; letter-spacing:1px; line-height:1; }
  .marcador .sep { color:#bbb; font-weight:400; margin:0 2px; }
  .estado { font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; padding:3px 9px; border-radius:20px; }
  .estado.final { background:#f1f3f4; color:#5f6368; }
  .estado.live { background:#e6f4ea; color:#137333; animation:pulso 1.5s infinite; }
  .estado.hora { background:#fef7e0; color:#7a5800; font-size:14px; font-weight:700; letter-spacing:0; padding:4px 10px; }
  @keyframes pulso { 0%,100%{opacity:1}50%{opacity:.5} }
  .tabla { width:100%; border-collapse:collapse; }
  .tabla thead th { font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#5f6368; padding:8px 10px; text-align:center; border-bottom:1px solid #f1f3f4; }
  .tabla thead th.eq-col { text-align:left; }
  .tabla tbody tr { border-bottom:1px solid #f8f9fa; }
  .tabla tbody tr:last-child { border-bottom:none; }
  .tabla tbody tr:hover { background:#f8f9fa; }
  .tabla tbody td { padding:10px 10px; text-align:center; font-size:15px; vertical-align:middle; }
  .tabla tbody td.pos { width:32px; font-size:13px; font-weight:700; color:#5f6368; }
  .tabla tbody td.eq-col { text-align:left; }
  .celda-eq { display:flex; align-items:center; gap:10px; }
  .escudo-t { width:26px; height:26px; object-fit:contain; flex-shrink:0; }
  .eq-nom-t { font-size:14px; font-weight:600; }
  .pts-t { font-size:17px; font-weight:800; }
  .zona-ch td.pos { border-left:4px solid #1a73e8; padding-left:7px; }
  .zona-el td.pos { border-left:4px solid #34a853; padding-left:7px; }
  .zona-conf td.pos { border-left:4px solid #fbbc04; padding-left:7px; }
  .zona-rel td.pos { border-left:4px solid #ea4335; padding-left:7px; }
  .leyenda { display:flex; gap:16px; flex-wrap:wrap; padding:10px 16px; font-size:12px; color:#5f6368; border-top:1px solid #f1f3f4; }
  .ley { display:flex; align-items:center; gap:5px; }
  .ley-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }
  .proximo { display:grid; grid-template-columns:1fr 110px 1fr; align-items:center; padding:12px 16px; border-bottom:1px solid #f1f3f4; gap:6px; }
  .proximo:last-child { border-bottom:none; }
  .prox-centro { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .prox-fecha { font-size:11px; color:#5f6368; text-align:center; }
  .prox-hora { font-size:16px; font-weight:700; }
  .cargando { text-align:center; padding:50px 20px; color:#5f6368; font-size:16px; }
  .spinner { width:30px; height:30px; border:3px solid #e0e0e0; border-top-color:#1a73e8; border-radius:50%; animation:girar .8s linear infinite; margin:0 auto 12px; }
  .pie-act { text-align:center; font-size:12px; color:#5f6368; padding:8px; }
  @media(max-width:480px){
    .partido,.proximo { grid-template-columns:1fr 90px 1fr; padding:12px 10px; }
    .eq-nom,.eq-nom-t { font-size:13px; }
    .marcador { font-size:22px; }
    .escudo-p { width:30px; height:30px; }
  }
</style>
</head>

  "Villarreal CF":"VIL", "Real Betis":"RBB", "Celta de Vigo":"RCC", "RC Celta":"RCC",
  Espanyol:"ESP", "RCD Espanyol":"ESP", "Real Sociedad":"RSO",
  "Athletic Club":"ATH", "Athletic Bilbao":"ATH", Osasuna:"OSA", "CA Osasuna":"OSA",
  "Getafe CF":"GET", Getafe:"GET", "Sevilla FC":"SEV", Sevilla:"SEV",
  "Girona FC":"GIR", Girona:"GIR", "Valencia CF":"VCF", Valencia:"VCF",
  "Rayo Vallecano":"RVC", "Deportivo Alaves":"ALA", "Alaves":"ALA",
  "Elche CF":"ELC", Elche:"ELC", "RCD Mallorca":"MAL", Mallorca:"MAL",
  "Levante UD":"LEV", Levante:"LEV", "Real Oviedo":"OVI", Oviedo:"OVI"
};
const NOMBRES_ES = {
  BAR:"FC Barcelona", RMA:"Real Madrid", ATM:"Atlético de Madrid",
  VIL:"Villarreal CF", RBB:"Real Betis", RCC:"Celta de Vigo",
  ESP:"Espanyol", RSO:"Real Sociedad", ATH:"Athletic Club",
  OSA:"Osasuna", GET:"Getafe CF", SEV:"Sevilla FC",
  GIR:"Girona FC", VCF:"Valencia CF", RVC:"Rayo Vallecano",
  ALA:"Dep. Alavés", ELC:"Elche CF", MAL:"Mallorca",
  LEV:"Levante UD", OVI:"Real Oviedo"
};

function abr(nombre) {
  if (!nombre) return '???';
  // Direct match
  if (NOMBRES[nombre]) return NOMBRES[nombre];
  // Partial match
  for (var k in NOMBRES) {
    if (nombre.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(nombre.toLowerCase().split(' ')[0])) return NOMBRES[k];
  }
  return nombre.substring(0,3).toUpperCase();
}

function mkImg(a, size) {
  var img = document.createElement('img');
  img.src = ESCUDOS[a] || '';
  img.alt = NOMBRES_ES[a] || a;
  img.style.cssText = 'width:'+size+'px;height:'+size+'px;object-fit:contain;flex-shrink:0;';
  return img;
}
function mkNom(a, cls) {
  var s = document.createElement('span');
  s.className = 'eq-nom' + (cls?' '+cls:'');
  s.textContent = NOMBRES_ES[a] || a;
  return s;
}

function fmtFecha(str) {
  // str = "2026-03-15 20:00:00"
  var d = new Date(str.replace(' ','T'));
  return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
}
function fmtHora(str) {
  var d = new Date(str.replace(' ','T'));
  return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

function tick() {
  document.getElementById('reloj').textContent =
    new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}
setInterval(tick,1000); tick();

async function cargar(manual) {
  var ico = document.getElementById('ico-ref');
  if (manual) ico.classList.add('spin');

  try {
    // Fetch últimos resultados y próximos partidos
    var [evPast, evNext, tabla] = await Promise.all([
      fetch('https://www.thesportsdb.com/api/v1/json/123/eventsseason.php?id=4335&s=2025-2026').then(r=>r.json()),
      fetch('https://www.thesportsdb.com/api/v1/json/123/eventsnextleague.php?id=4335').then(r=>r.json()),
      fetch('https://www.thesportsdb.com/api/v1/json/123/lookuptable.php?l=4335&s=2025-2026').then(r=>r.json())
    ]);

    var cont = document.getElementById('cont');
    cont.innerHTML = '';

    // ── Encontrar jornada más reciente con resultados ──
    var todos = evPast.events || [];
    // Filtrar solo partidos jugados
    var jugados = todos.filter(function(e){ return e.intHomeScore !== null && e.intHomeScore !== ''; });
    // Ordenar por fecha desc
    jugados.sort(function(a,b){ return new Date(b.dateEvent)-new Date(a.dateEvent); });
    // Jornada más reciente
    var ultRonda = jugados.length ? jugados[0].intRound : null;
    var ultJornada = jugados.filter(function(e){ return e.intRound == ultRonda; });
    ultJornada.sort(function(a,b){ return new Date(a.dateEvent+' '+(a.strTime||'00:00:00'))-new Date(b.dateEvent+' '+(b.strTime||'00:00:00')); });

    // ── PARTIDOS JORNADA ACTUAL ──
    if (ultJornada.length) {
      document.getElementById('h-sub').textContent = 'Jornada '+ultRonda+' · 2025/26';
      var secP = document.createElement('div'); secP.className='seccion';
      secP.innerHTML = '<div class="sec-titulo">Jornada '+ultRonda+'</div>';

      ultJornada.forEach(function(e) {
        var ha = abr(e.strHomeTeam), aa = abr(e.strAwayTeam);
        var row = document.createElement('div'); row.className='partido';

        var dH = document.createElement('div'); dH.className='eq-home';
        dH.appendChild(mkNom(ha,'home')); dH.appendChild(mkImg(ha,38));

        var dC = document.createElement('div'); dC.className='centro';
        var marc = document.createElement('div'); marc.className='marcador';
        marc.innerHTML = e.intHomeScore+'<span class="sep">–</span>'+e.intAwayScore;
        var est = document.createElement('div'); est.className='estado final'; est.textContent='Final';
        dC.appendChild(marc); dC.appendChild(est);

        var dA = document.createElement('div'); dA.className='eq-away';
        dA.appendChild(mkImg(aa,38)); dA.appendChild(mkNom(aa,''));

        row.appendChild(dH); row.appendChild(dC); row.appendChild(dA);
        secP.appendChild(row);
      });
      cont.appendChild(secP);
    }

    // ── CLASIFICACIÓN ──
    if (tabla.table && tabla.table.length) {
      var secC = document.createElement('div'); secC.className='seccion';
      secC.innerHTML = '<div class="sec-titulo">Clasificación</div>';
      var tbl = document.createElement('table'); tbl.className='tabla';
      tbl.innerHTML='<thead><tr><th style="width:32px">#</th><th class="eq-col">Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>Pts</th></tr></thead>';
      var tbody = document.createElement('tbody');

      tabla.table.forEach(function(t) {
        var a = abr(t.strTeam);
        var pos = parseInt(t.intRank);
        var zona = pos<=4?'zona-ch':pos<=6?'zona-el':pos===7?'zona-conf':pos>=18?'zona-rel':'';
        var tr = document.createElement('tr'); if(zona) tr.className=zona;

        var tdP=document.createElement('td'); tdP.className='pos'; tdP.textContent=pos; tr.appendChild(tdP);
        var tdE=document.createElement('td'); tdE.className='eq-col';
        var cel=document.createElement('div'); cel.className='celda-eq';
        cel.appendChild(mkImg(a,26));
        var n=document.createElement('span'); n.className='eq-nom-t'; n.textContent=NOMBRES_ES[a]||t.strTeam;
        cel.appendChild(n); tdE.appendChild(cel); tr.appendChild(tdE);

        [t.intPlayed,t.intWin,t.intDraw,t.intLoss].forEach(function(v){
          var td=document.createElement('td'); td.textContent=v||0; tr.appendChild(td);
        });
        var tdPts=document.createElement('td'); tdPts.className='pts-t'; tdPts.textContent=t.intPoints; tr.appendChild(tdPts);
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      secC.appendChild(tbl);
      secC.innerHTML += '<div class="leyenda">'+
        '<div class="ley"><div class="ley-dot" style="background:#1a73e8"></div>Champions</div>'+
        '<div class="ley"><div class="ley-dot" style="background:#34a853"></div>Europa</div>'+
        '<div class="ley"><div class="ley-dot" style="background:#fbbc04"></div>Conference</div>'+
        '<div class="ley"><div class="ley-dot" style="background:#ea4335"></div>Descenso</div>'+
        '</div>';
      cont.appendChild(secC);
    }

    // ── PRÓXIMOS ──
    var proximos = evNext.events || [];
    proximos.sort(function(a,b){ return new Date(a.dateEvent+' '+(a.strTime||'00:00:00'))-new Date(b.dateEvent+' '+(b.strTime||'00:00:00')); });

    if (proximos.length) {
      var ronda = proximos[0].intRound;
      var secN = document.createElement('div'); secN.className='seccion';
      secN.innerHTML='<div class="sec-titulo">Jornada '+ronda+' · Próximos partidos</div>';

      proximos.forEach(function(e) {
        var ha=abr(e.strHomeTeam), aa=abr(e.strAwayTeam);
        var row=document.createElement('div'); row.className='proximo';

        var dH=document.createElement('div'); dH.className='eq-home';
        dH.appendChild(mkNom(ha,'home')); dH.appendChild(mkImg(ha,38));

        var dC=document.createElement('div'); dC.className='prox-centro';
        dC.innerHTML='<div class="prox-fecha">'+fmtFecha(e.dateEvent)+'</div>'+
          '<div class="prox-hora">'+(e.strTime?fmtHora(e.dateEvent+' '+e.strTime):'--:--')+'</div>';

        var dA=document.createElement('div'); dA.className='eq-away';
        dA.appendChild(mkImg(aa,38)); dA.appendChild(mkNom(aa,''));

        row.appendChild(dH); row.appendChild(dC); row.appendChild(dA);
        secN.appendChild(row);
      });
      cont.appendChild(secN);
    }

    // Pie
    var pie=document.createElement('div'); pie.className='pie-act';
    pie.textContent='Actualizado a las '+new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    cont.appendChild(pie);

  } catch(e) {
    document.getElementById('cont').innerHTML=
      '<div class="cargando">⚠️ Error cargando datos.<br><small style="color:#aaa">'+e.message+'</small><br><br>'+
      '<button onclick="cargar(true)" style="background:#1a73e8;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">Reintentar</button></div>';
  }

  document.getElementById('ico-ref').classList.remove('spin');
}

// Auto-refresco cada 5 minutos
setInterval(function(){ cargar(false); }, 300000);
cargar(false);
</script>
</body>
</html>
